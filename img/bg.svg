<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 主渐变：极客深色 + 顶部微光 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="40%"  stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#060a10"/>
    </linearGradient>

    <!-- 顶部青色光晕 -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#3edcc8" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#2185d0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- 中部偏左蓝色光晕 -->
    <radialGradient id="leftGlow" cx="20%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2185d0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- 中部偏右紫色光晕 -->
    <radialGradient id="rightGlow" cx="80%" cy="60%" r="45%">
      <stop offset="0%"   stop-color="#5a9cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- 等距网格图案 -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#3edcc8" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>

    <!-- 噪点滤镜 -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.2  0 0 0 0 0.25  0 0 0 0 0.3  0 0 0 0.04 0"/>
    </filter>
  </defs>

  <!-- 1. 底色 -->
  <rect width="1920" height="1200" fill="url(#bgGrad)"/>

  <!-- 2. 顶部青色光晕 -->
  <rect width="1920" height="1200" fill="url(#topGlow)"/>

  <!-- 3. 左侧蓝色光晕 -->
  <rect width="1920" height="1200" fill="url(#leftGlow)"/>

  <!-- 4. 右侧紫色光晕 -->
  <rect width="1920" height="1200" fill="url(#rightGlow)"/>

  <!-- 5. 网格 -->
  <rect width="1920" height="1200" fill="url(#grid)"/>

  <!-- 6. 噪点（让渐变更真实） -->
  <rect width="1920" height="1200" filter="url(#noise)"/>

  <!-- 7. 散落星点 -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="180"  cy="150" r="1.2"/>
    <circle cx="420"  cy="320" r="0.8"/>
    <circle cx="760"  cy="180" r="1.0"/>
    <circle cx="1180" cy="420" r="0.9"/>
    <circle cx="1500" cy="240" r="1.1"/>
    <circle cx="1720" cy="380" r="0.8"/>
    <circle cx="280"  cy="680" r="0.9"/>
    <circle cx="640"  cy="820" r="1.0"/>
    <circle cx="1080" cy="940" r="0.8"/>
    <circle cx="1420" cy="780" r="1.1"/>
    <circle cx="1680" cy="880" r="0.9"/>
    <circle cx="350"  cy="1040" r="1.0"/>
    <circle cx="820"  cy="1080" r="0.8"/>
    <circle cx="1280" cy="1100" r="0.9"/>
  </g>
</svg>
